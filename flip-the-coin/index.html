<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Flip the coin game challenge on devChallenges.io" />
    <meta name="keywords" content="flip the coin, coin flip game, devChallenges, coding challenge" />
    <title>Flip the coin | devChallenges.io</title>
    <link
      rel="icon"
      href="./assets/images/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

  <body>
    <main class="main">
      <div>
        <h1>Flip a Coin Game</h1>

      </div>

      <div>
        <div>
          <img src="./assets/images/heads.svg" alt="Icon image" class="coin" />
        </div>
        <div>
          <img src="./assets/images/shadow.svg" alt="Shadow image" class="shadow" />
        </div>
      </div>

      <div>
        <p class="coin-face">Heads</p>
      </div>

      <div>
        <button>Random</button>
      </div>
    </main>

    <script src="./assets/js/index.js"></script>

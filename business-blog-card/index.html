<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="This is a solution for the Business Blog Card challenge on devChallenges.io" />
    <meta name="keywords" content="HTML, CSS, Business Blog Card, devChallenges" />
    <link
      rel="icon"
      href="./assets/images/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />
    <title>Business Blog Card | devChallenges.io</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
  </head>
  <body>
    <main>
      <article class="card">
        <div class="image-wrapper">
          <img
            src="./assets/images/hero-image.jpg"
            class="hero-image"
            alt="Hero images"
          />
          <img
            src="./assets/images/white-overlay.svg"
            class="overlay-image"
            alt="Overlay"
          />
        </div>

        <div class="card-content">
          <h1>Perfect solution for small business</h1>
          <p>
            Small businesses need to generate leads to grow. You can use tools
            like Ringy.
          </p>
        </div>

        <footer>
          <div>
            <img
              src="./assets/images/avatar-image-business-card.png"
              alt="Avatar card"
              width="45"
              height="45"
            />
          </div>
          <div>
            <p>
              Amy Burgess <br />
              <span>Customer Manger, Solution Oy</span>
            </p>
          </div>
        </footer>
      </article>
    </main>
  </body>
</html>
